services:
    db:
        image: postgres:16
        container_name: jugamir_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: jugamir
            POSTGRES_PASSWORD: jugamir_pw
            POSTGRES_DB: jugamirdb
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
    
    pgadmin:
        image: dpage/pgadmin4
        container_name: jugamir_pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@jugamir.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        depends_on:
            - db
    
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: jugamir_backend
        restart: unless-stopped
        environment:
            DB_HOST: db
            DB_PORT: 5432
            DB_NAME: jugamirdb
            DB_USER: jugamir
            DB_PASSWORD: jugamir_pw
            SERVER_PORT: 8080
            SHOW_SQL: true
        ports:
            - "8080:8080"
        depends_on:
            - db
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

volumes:
    postgres_data:
    pgadmin_data:
        

    