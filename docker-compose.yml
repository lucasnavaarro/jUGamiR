services:
    db:
        image: postgres:16
        container_name: jugamir_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: jugamirdb
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
    
    pgadmin:
        image: dpage/pgadmin4
        container_name: jugamir_pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
        ports:
            - "5050:80"
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        depends_on:
            - db
    
    backend:
        build:
            context: .
            dockerfile: backend/Dockerfile
        container_name: jugamir_backend
        restart: unless-stopped
        volumes:
            - ./backend/src/main/resources/static:/app/static
        environment:
            DB_HOST: db
            DB_PORT: 5432
            DB_NAME: jugamirdb
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            SERVER_PORT: 8080
            SHOW_SQL: true
            MAIL_USERNAME: ${MAIL_USERNAME}
            MAIL_PASSWORD: ${MAIL_PASSWORD}
            JWT_SECRET: ${JWT_SECRET}
            SCRIPTS_PATH: /app/db
            IMAGENES_PATH: /app/static
            
        ports:
            - "8080:8080"
        depends_on:
            - db
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

volumes:
    postgres_data:
    pgadmin_data:
        

    